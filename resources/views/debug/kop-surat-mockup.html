<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Kop Surat Premium</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .letter-page {
            width: 794px;
            height: 1123px;
            background: white;
            padding: 60px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header {
            border-bottom: 3px double #1a1a1a;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: #eee;
            border-radius: 12px;
            display: flex;
            items-center;
            justify-content: center;
            font-size: 10px;
            color: #999;
            border: 1px solid #ddd;
        }

        .header-text {
            flex-1: 1;
            text-align: center;
        }

        .instansi-name {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1e3a8a;
            margin-bottom: 5px;
        }

        .campus-name {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        .address {
            font-size: 12px;
            color: #444;
            line-height: 1.5;
            font-style: italic;
        }

        .letter-info {
            text-align: center;
            margin-top: 30px;
        }

        .letter-title {
            font-size: 18px;
            font-weight: bold;
            text-decoration: underline;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .letter-number {
            font-size: 14px;
            color: #333;
        }

        .placeholder {
            background: #dcfce7;
            border: 1px dashed #22c55e;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #166534;
            font-weight: bold;
        }

        @media print {
            body {
                background: none;
                padding: 0;
            }

            .letter-page {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="letter-page">
        <div class="header">
            <div class="logo">
                <img src="/api/media/logo_politeknik_pajajaran.png" alt="Logo"
                    style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;">
            </div>
            <div class="header-text">
                <div class="instansi-name">Yayasan Pendidikan Pajajaran</div>
                <div class="campus-name">Politeknik Pajajaran</div>
                <div class="address">
                    Jl. Raya Pajajaran No. 123, Kota Bandung, Jawa Barat 40123<br>
                    Telp: (022) 1234567 | Email: info@poltek-pajajaran.ac.id | Web: www.poltek-pajajaran.ac.id
                </div>
            </div>
        </div>

        <div class="letter-info">
            <div class="letter-title">Surat Keterangan Aktif Kuliah</div>
            <div class="letter-number">Nomor: <span class="placeholder">${letter_number}</span></div>
        </div>

        <!-- Konten surat sengaja dikosongkan sesuai permintaan -->
    </div>
</body>

</html>
